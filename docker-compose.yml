services:
  control-plane:
    build: .
    command: ["./build/control-plane", "--demo"]

  agent-a:
    build: .
    command: ["./build/node-agent", "node-a", "4000", "8192"]

  agent-b:
    build: .
    command: ["./build/node-agent", "node-b", "4000", "8192"]

  agent-c:
    build: .
    command: ["./build/node-agent", "node-c", "4000", "8192"]

  etcd:
    image: quay.io/coreos/etcd:v3.5.15
    command:
      - /usr/local/bin/etcd
      - --name=mini-borg-etcd
      - --advertise-client-urls=http://0.0.0.0:2379
      - --listen-client-urls=http://0.0.0.0:2379
